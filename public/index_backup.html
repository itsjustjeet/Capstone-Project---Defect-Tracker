<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defect Tracking & Management System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root"></div>

  <script>
    // ===== API SERVICE =====
    const api = {
      async getDefects() {
        const res = await fetch('/api/defects');
        const data = await res.json();
        return data.data || [];
      },

      async createDefect(payload) {
        const res = await fetch('/api/defects', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        return res.json();
      },

      async updateDefect(id, payload) {
        const res = await fetch(`/api/defects/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        return res.json();
      },

      async deleteDefect(id) {
        const res = await fetch(`/api/defects/${id}`, {
          method: 'DELETE'
        });
        return res.json();
      },

      async getStats() {
        const res = await fetch('/api/stats');
        const data = await res.json();
        return data.data;
      }
    };

    // ===== APP STATE =====
    let appState = {
      defects: [],
      stats: null,
      view: 'dashboard',
      selectedDefect: null,
      loading: true
    };

    // ===== RENDER FUNCTIONS =====
    function renderApp() {
      const root = document.getElementById('root');
      
      if (appState.loading) {
        root.innerHTML = '<div class="app"><div class="loader">Loading DTMS...</div></div>';
        return;
      }

      let content = '';
      
      if (appState.view === 'dashboard') {
        content = renderDashboard();
      } else if (appState.view === 'form') {
        content = renderForm();
      }

      let modal = '';
      if (appState.selectedDefect) {
        modal = renderModal();
      }

      root.innerHTML = `
        <div class="app">
          <header class="app-header">
            <div class="header-content">
              <h1>🐛 Defect Tracking & Management System</h1>
              <nav class="nav-tabs">
                <button class="nav-tab ${appState.view === 'dashboard' ? 'active' : ''}" onclick="switchView('dashboard')">Dashboard</button>
                <button class="nav-tab ${appState.view === 'form' ? 'active' : ''}" onclick="switchView('form')">Report Bug</button>
              </nav>
            </div>
          </header>
          <main class="app-main">
            ${content}
          </main>
          ${modal}
          <footer class="app-footer">
            <p>DTMS v1.0 | Software Project Management Capstone</p>
          </footer>
        </div>
      `;

      attachEventListeners();
    }

    function renderDashboard() {
      let statsHtml = '';
      if (appState.stats) {
        statsHtml = `
          <div class="stats-panel">
            <h3>Quick Stats</h3>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-number">${appState.stats.totalDefects}</div>
                <div class="stat-label">Total Defects</div>
              </div>
              <div class="stat-card">
                <div class="stat-number">${appState.stats.byStatus.Critical || 0}</div>
                <div class="stat-label">Critical</div>
              </div>
              <div class="stat-card">
                <div class="stat-number">${appState.stats.byStatus.Closed || 0}</div>
                <div class="stat-label">Resolved</div>
              </div>
            </div>
          </div>
        `;
      }

      const statuses = ['Open', 'In Progress', 'Resolved', 'Closed'];
      let boardHtml = '<div class="kanban-container">';
      
      statuses.forEach(status => {
        const statusDefects = appState.defects.filter(d => d.status === status);
        let cardsHtml = '';
        
        statusDefects.forEach(defect => {
          cardsHtml += `
            <div class="card priority-${defect.priority.toLowerCase()}" onclick="selectDefect('${defect.id}')">
              <div class="card-header">
                <span class="priority ${defect.priority.toLowerCase()}">${defect.priority}</span>
              </div>
              <div class="card-title">${escapeHtml(defect.title)}</div>
              ${defect.assignedTo ? `<div class="card-assigned">Assigned: ${escapeHtml(defect.assignedTo)}</div>` : ''}
              <div class="card-footer"><small>Click to edit</small></div>
            </div>
          `;
        });

        boardHtml += `
          <div class="kanban-column">
            <div class="column-header">
              <h3>${status}</h3>
              <span class="badge">${statusDefects.length}</span>
            </div>
            <div class="cards">
              ${cardsHtml || '<p style="color:#999;text-align:center;padding:1rem;">No defects</p>'}
            </div>
          </div>
        `;
      });

      boardHtml += '</div>';

      return `
        ${statsHtml}
        <div class="kanban-board">
          <h2>Defect Tracking Board</h2>
          ${boardHtml}
        </div>
      `;
    }

    function renderForm() {
      return `
        <div class="form-container">
          <h2>Report a New Defect</h2>
          <form id="defectForm" onsubmit="handleSubmitDefect(event)">
            <div class="form-group">
              <label>Title *</label>
              <input type="text" id="title" name="title" placeholder="Brief title of the defect" required />
            </div>
            <div class="form-group">
              <label>Description *</label>
              <textarea id="description" name="description" placeholder="Detailed description and steps to reproduce" rows="4" required></textarea>
            </div>
            <div class="form-group">
              <label>Priority</label>
              <select id="priority" name="priority">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
              </select>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Report Defect</button>
              <button type="button" class="btn btn-secondary" onclick="switchView('dashboard')">Cancel</button>
            </div>
          </form>
        </div>
      `;
    }

    function renderModal() {
      const d = appState.selectedDefect;
      if (!d) return '';

      return `
        <div class="modal-overlay" onclick="closeModal()">
          <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
              <h3>${escapeHtml(d.title)}</h3>
              <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
              <div class="detail-row">
                <strong>ID:</strong> <span class="mono">${escapeHtml(d.id)}</span>
              </div>
              <div class="detail-row">
                <strong>Priority:</strong>
                <span class="priority ${d.priority.toLowerCase()}">${d.priority}</span>
              </div>
              <div class="detail-row">
                <strong>Created:</strong> ${new Date(d.createdAt).toLocaleString()}
              </div>
              <div class="detail-row">
                <strong>Last Updated:</strong> ${new Date(d.updatedAt).toLocaleString()}
              </div>
              <div class="form-group">
                <label>Status</label>
                <select id="modalStatus" name="status">
                  <option value="Open" ${d.status === 'Open' ? 'selected' : ''}>Open</option>
                  <option value="In Progress" ${d.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                  <option value="Resolved" ${d.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                  <option value="Closed" ${d.status === 'Closed' ? 'selected' : ''}>Closed</option>
                </select>
              </div>
              <div class="form-group">
                <label>Assigned To</label>
                <input type="text" id="modalAssignedTo" value="${escapeHtml(d.assignedTo || '')}" placeholder="Developer name (leave blank for unassigned)" />
              </div>
              <div class="form-group">
                <label>Description</label>
                <textarea id="modalDescription" rows="4">${escapeHtml(d.description)}</textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-primary" onclick="handleSaveDefect()">Save Changes</button>
              <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            </div>
          </div>
        </div>
      `;
    }

    // ===== EVENT HANDLERS =====
    function switchView(view) {
      appState.view = view;
      renderApp();
    }

    function selectDefect(id) {
      appState.selectedDefect = appState.defects.find(d => d.id === id);
      renderApp();
    }

    function closeModal() {
      appState.selectedDefect = null;
      renderApp();
    }

    async function handleSubmitDefect(event) {
      event.preventDefault();
      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const priority = document.getElementById('priority').value;

      if (!title || !description) {
        alert('Please fill in all fields');
        return;
      }

      try {
        const result = await api.createDefect({ title, description, priority });
        if (result.success) {
          alert('Bug reported successfully!');
          switchView('dashboard');
          await loadData();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function handleSaveDefect() {
      const id = appState.selectedDefect.id;
      const status = document.getElementById('modalStatus').value;
      const assignedTo = document.getElementById('modalAssignedTo').value.trim();
      const description = document.getElementById('modalDescription').value;

      try {
        const result = await api.updateDefect(id, { status, assignedTo: assignedTo || null, description });
        if (result.success) {
          alert('Defect updated successfully!');
          closeModal();
          await loadData();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function attachEventListeners() {
      // Event listeners already attached via inline handlers
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // ===== DATA LOADING =====
    async function loadData() {
      appState.loading = true;
      renderApp();

      try {
        const defectsData = await api.getDefects();
        const statsData = await api.getStats();
        appState.defects = defectsData;
        appState.stats = statsData;
      } catch (err) {
        console.error('Error loading data:', err);
        alert('Error loading data: ' + err.message);
      }

      appState.loading = false;
      renderApp();
    }

    // ===== INITIALIZE APP =====
    loadData();
  </script>
</body>
</html>
